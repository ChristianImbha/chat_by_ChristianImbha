<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Kadea-Chat</title>
    <!-- Chargement des bibliothèques de styles et d'icônes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f6fa] text-[#1e293b] flex flex-col md:flex-row h-screen overflow-hidden">

    <!-- Barre latérale / Menu Bas (Responsive) -->
    <!-- md:flex -> À partir d'un écran d'ordinateur, affichage vertical sur le côté -->
    <!-- max-md:fixed max-md:bottom-0 max-md:left-0 max-md:right-0 max-md:h-16 -> Sur mobile, barre fixe tout en bas -->
    <aside class="w-full md:w-20 bg-white border-t md:border-t-0 md:border-r border-slate-200 flex flex-row md:flex-col justify-between items-center px-6 py-2 md:py-6 flex-shrink-0 fixed bottom-0 left-0 right-0 h-16 md:relative md:h-full z-50 shadow-lg md:shadow-none">
        
        <div class="flex flex-row md:flex-col items-center justify-around md:justify-start gap-0 md:gap-8 w-full">
            <span class="text-blue-700 font-bold text-lg md:text-xl tracking-tight hidden md:block">forum</span>
            <nav class="flex flex-row md:flex-col gap-2 md:gap-6 w-full justify-around md:items-center">
                <!-- Redirection vers le chat principal -->
                <a href="chat.html" class="p-2.5 md:p-3 text-slate-400 hover:text-blue-600 rounded-xl transition flex items-center justify-center">
                    <i data-lucide="message-square" class="w-5 h-5 md:w-6 md:h-6"></i>
                </a>
                <button class="p-2.5 md:p-3 text-slate-400 hover:text-slate-600 rounded-xl transition flex items-center justify-center">
                    <i data-lucide="phone" class="w-5 h-5 md:w-6 md:h-6"></i>
                </button>
                <a href="Profil.html" class="p-2.5 md:p-3 text-blue-600 bg-blue-50 rounded-xl transition flex items-center justify-center">
                    <i data-lucide="user" class="w-5 h-5 md:w-6 md:h-6"></i>
                </a>
                <button class="p-2.5 md:p-3 text-slate-400 hover:text-slate-600 rounded-xl transition flex items-center justify-center hidden sm:flex">
                    <i data-lucide="calendar" class="w-5 h-5 md:w-6 md:h-6"></i>
                </button>
            </nav>
        </div>

        <!-- Masqué sur petit mobile pour gagner de la place, affiché sur Desktop -->
        <div class="flex flex-row md:flex-col items-center gap-4 md:gap-6 hidden md:flex">
            <div class="relative w-full flex justify-center">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r hidden md:block"></div>
                <button class="p-3 text-blue-600 rounded-xl">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </div>
            <button class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition shadow-sm">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>

    <!-- Conteneur principal du Profil -->
    <!-- pb-16 md:pb-0 -> Laisse de l'espace en bas sur mobile pour ne pas être caché par la barre de navigation -->
    <main class="flex flex-1 flex-col h-full bg-gray-50 pb-16 md:pb-0 overflow-hidden" id="chat-panel">
        
        <!-- En-tête -->
        <div class="flex items-center justify-between bg-gray-100 p-3.5 border-b border-gray-200 shadow-sm flex-shrink-0">
            <div class="flex items-center space-x-3">
                <a href="chat.html" class="p-1 text-gray-500 hover:text-blue-600 rounded-lg transition">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </a>                     
                <h1 id="active-chat-title" class="font-bold text-blue-600 text-xs md:text-sm tracking-wide">Kadea-Chat • Mon Profil</h1>                      
            </div>
            <div>
                <a href="chat.html" class="text-[11px] md:text-xs bg-white text-gray-600 border border-gray-200 px-2.5 py-1.5 rounded-lg hover:text-blue-600 transition shadow-sm font-semibold">
                    Retour
                </a>
            </div>
        </div>

        <!-- Zone du formulaire centrée -->
        <div class="flex-1 overflow-y-auto p-4 md:p-6 flex flex-col items-center justify-start md:justify-center">
            <div class="bg-white p-5 md:p-8 rounded-2xl shadow-sm border border-slate-200 w-full max-w-md flex flex-col items-center my-auto">
                
                <!-- Section Avatar dynamique -->
                <div class="relative group cursor-pointer mb-5 md:mb-6" id="change-avatar-trigger" onclick="document.getElementById('avatar-input').click()">
                    <img id="profile-page-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=default" alt="Avatar" class="w-24 h-24 md:w-28 md:h-28 rounded-full border-4 border-white object-cover shadow-lg group-hover:opacity-80 transition">
                    <!-- Icône overlay au survol -->
                    <div class="absolute inset-0 flex items-center justify-center bg-black/40 rounded-full opacity-0 group-hover:opacity-100 transition">
                        <i data-lucide="camera" class="w-5 h-5 md:w-6 md:h-6 text-white"></i>
                    </div>
                    <!-- Input file masqué -->
                    <input type="file" id="avatar-input" accept="image/*" class="hidden">
                </div>
                
                <!-- Formulaire d'informations -->
                <form id="profile-form" class="space-y-4 md:space-y-5 w-full">
                    <div>
                        <label class="block text-xs md:text-sm font-semibold text-blue-600 mb-1">Votre nom</label>
                        <div class="flex items-center border-b-2 border-gray-200 focus-within:border-blue-600 py-1.5 transition">
                            <input type="text" id="profile-name" placeholder="Ex: Christian Imbha" required
                                class="appearance-none bg-transparent border-none w-full text-gray-700 mr-2 py-1 px-1 text-sm md:text-base leading-tight focus:outline-none">
                            <i class="fas fa-pen text-gray-400 text-xs md:text-sm"></i>
                        </div>
                        <p class="text-[11px] text-gray-400 mt-1">Ce nom sera visible par vos contacts Kadea.</p>
                    </div>

                    <div>
                        <label class="block text-xs md:text-sm font-semibold text-blue-600 mb-1">Actu / Bio</label>
                        <div class="flex items-center border-b-2 border-gray-200 focus-within:border-blue-600 py-1.5 transition">
                            <input type="text" id="profile-status" placeholder="Disponible"
                                class="appearance-none bg-transparent border-none w-full text-gray-700 mr-2 py-1 px-1 text-sm md:text-base leading-tight focus:outline-none">
                            <i class="fas fa-pen text-gray-400 text-xs md:text-sm"></i>
                        </div>
                    </div>

                    <div class="pt-3 md:pt-4">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 md:py-3 px-4 rounded-xl shadow-md transition duration-200 uppercase tracking-wide text-xs md:text-sm">
                            Enregistrer les modifications
                        </button>
                    </div>
                </form>

                <!-- Zone de message d'alerte (Succès / Erreur) -->
                <div id="alert-box" class="hidden w-full p-3 rounded-xl text-xs md:text-sm text-center font-medium mt-4"></div>

            </div>
        </div>            
    </main>

    <!-- Initialisation des icônes Lucide -->
    <script>
        lucide.createIcons();
    </script>
    <script>"profil.js"</script>
</body>
</html>
