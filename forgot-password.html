<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class' 
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-96">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Réinitialisation</h2>

        <form id="forgot-form" class="space-y-4">
            <p class="text-sm text-gray-600">Entrez votre adresse email pour recevoir un code de réinitialisation à 6 chiffres.</p>
            <div>
                <label for="forgot-email" class="block text-sm font-medium text-gray-700">Email</label>
                <input type="email" id="forgot-email" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition-colors">Envoyer le code</button>
        </form>

        <form id="reset-form" class="space-y-4 hidden">
            <p class="text-sm text-green-600 font-semibold">Un code a été envoyé ! Saisissez-le ci-dessous avec votre nouveau mot de passe.</p>
            <div>
                <label for="reset-code" class="block text-sm font-medium text-gray-700">Code à 6 chiffres</label>
                <input type="text" id="reset-code" maxlength="6" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border text-center font-bold tracking-widest">
            </div>
            <div>
                <label for="new-password" class="block text-sm font-medium text-gray-700">Nouveau mot de passe</label>
                <input type="password" id="new-password" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 bg-gray-50 border">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded-md hover:bg-blue-700 transition-colors">Changer le mot de passe</button>
        </form>

        <div class="mt-4 text-center">
            <a href="login.html" class="text-sm text-blue-600 hover:underline">Retour à la connexion</a>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
