<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié</title>
    <script>
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class' 
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-900 flex items-center justify-center h-screen transition-colors duration-300">
    <div class="bg-white dark:bg-slate-800 p-8 rounded-2xl shadow-md border border-slate-200 dark:border-slate-700 w-full max-w-md mx-4 transition-colors duration-300">
        <h2 class="text-2xl font-bold mb-6 text-center text-slate-800 dark:text-slate-100">Réinitialisation</h2>

        <!-- Formulaire d'envoi de l'email -->
        <form id="forgot-form" class="space-y-4">
            <p class="text-sm text-slate-600 dark:text-slate-400">Entrez votre adresse email pour recevoir un code de réinitialisation à 6 chiffres.</p>
            <div>
                <label for="forgot-email" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Email</label>
                <input type="email" id="forgot-email" required class="mt-1 block w-full rounded-xl border-slate-200 dark:border-slate-700 shadow-sm p-2.5 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-600 dark:focus:border-blue-400 border transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 transition-colors font-medium">Envoyer le code</button>
        </form>

        <!-- Formulaire de réinitialisation du mot de passe (masqué au départ) -->
        <form id="reset-form" class="space-y-4 hidden">
            <p class="text-sm text-green-600 dark:text-green-400 font-semibold">Un code a été envoyé ! Saisissez-le ci-dessous avec votre nouveau mot de passe.</p>
            <div>
                <label for="reset-code" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Code à 6 chiffres</label>
                <input type="text" id="reset-code" maxlength="6" required class="mt-1 block w-full rounded-xl border-slate-200 dark:border-slate-700 shadow-sm p-2.5 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 text-center font-bold tracking-widest focus:outline-none focus:border-blue-600 dark:focus:border-blue-400 border transition">
            </div>
            <div>
                <label for="new-password" class="block text-sm font-medium text-slate-700 dark:text-slate-300">Nouveau mot de passe</label>
                <input type="password" id="new-password" required class="mt-1 block w-full rounded-xl border-slate-200 dark:border-slate-700 shadow-sm p-2.5 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 focus:outline-none focus:border-blue-600 dark:focus:border-blue-400 border transition">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-xl hover:bg-blue-700 transition-colors font-medium">Changer le mot de passe</button>
        </form>

        <div class="mt-6 text-center">
            <a href="login.html" class="text-sm text-blue-600 dark:text-blue-400 hover:underline">Retour à la connexion</a>
        </div>
    </div>

    <script src="forgot-password.js"></script>
</body>
</html>
