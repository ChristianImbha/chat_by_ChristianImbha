<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea chat - Login</title>
    <script>
    // Ce code s'exécute immédiatement avant le rendu de la page
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class' 
        }
    </script> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#f8fafc] flex flex-col items-center justify-center min-h-screen p-4 antialiased">
    
    <header class="flex flex-col items-center text-center mb-6">
        <div class="text-blue-600 p-2 rounded-xl bg-blue-50">
            <i data-lucide="message-square" class="w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-bold text-blue-600 tracking-tight mt-2">Welcome back</h1>
    </header>

    <main class="w-full max-w-md">
        <div class="bg-white rounded-[2rem] border border-slate-100 p-8 shadow-sm">
          
            <div class="mb-6">
                <p class="text-sm text-slate-500 mt-1 text-center">Please enter your details to sign in to Kadea chat</p>
            </div> 

            <form id="login-form" class="space-y-4">
                
                <!-- Champ Email -->
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-600 mb-1.5">Email Address</label>
                    <div class="relative rounded-xl">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-regular fa-envelope text-slate-400"></i>
                        </div>
                        <input type="email" id="email" placeholder="name@example.com" required
                          class="block w-full pl-11 pr-4 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
                    </div>
                </div>

                <!-- Champ Mot de passe (CORRIGÉ ET SÉCURISÉ) -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-sm font-medium text-slate-600">Password</label>
                        <div class="text-sm">
                            <a href="forgot-password.html" class="font-medium text-blue-600 hover:text-blue-700 hover:underline">
                                Forgot password?
                            </a>
                        </div>
                    </div> 
                    
                    <!-- Le conteneur relatif -->
                    <div class="relative flex items-center group">
                        <!-- Icône Cadenas à gauche pour correspondre au design de l'email -->
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        
                        <!-- L'input avec l'ID 'password' et le padding à droite pr-12 pour laisser place à l'oeil -->
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password"
                               class="block w-full pl-11 pr-12 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
                        
                        <!-- Le bouton œil isolé et forcé au premier plan (z-10) -->
                        <button type="button" id="toggle-password-btn" 
                                class="absolute right-0 top-0 bottom-0 px-4 flex items-center justify-center text-slate-400 hover:text-blue-600 transition-colors z-10 cursor-pointer focus:outline-none">
                            <i id="toggle-password-icon" data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div> 

                <div class="flex items-center pt-2">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                           class="h-4 w-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500 cursor-pointer">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600 cursor-pointer select-none">
                        Keep me signed in
                    </label>
                </div>

                <div class="pt-2">
                    <button type="submit" id="login-btn" class="w-full flex items-center justify-center bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-4 rounded-xl transition duration-200 disabled:opacity-75 disabled:cursor-not-allowed">
                        <span id="login-spinner" class="hidden w-5 h-5 mr-2 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                        <span id="login-btn-text">Se connecter</span>
                    </button>
                </div>   
            </form>
        </div>

        <p class="text-sm text-slate-600 text-center mt-6">
            Don't have an account? <a href="register.html" class="text-blue-600 font-semibold hover:underline">Create Account</a>
        </p>
        
    </main>

    <script>
        // Initialisation de Lucide au démarrage
        lucide.createIcons();
    </script>

    <script src="login.js"></script>
    <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full"></div>
</body>
</html>
