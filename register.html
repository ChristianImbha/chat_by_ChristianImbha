<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadea Chat - Inscription</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<header class="flex flex-col items-center text-center">
    <img src="comment.png" alt="Chat Logo" width="48" height="48">
    <h1 class="text-2xl font-bold text-blue-600 tracking-tight">Kadea Chat</h1>
</header>
<body class="bg-[#f8fafc] flex flex-col items-center justify-center min-h-screen p-4 antialiased">

  <main class="w-full max-w-md">
    
    <div class="bg-white rounded-[2rem] border border-slate-100 p-8 shadow-sm">
      
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Create Account</h1>
        <p class="text-sm text-slate-500 mt-1">Join the community and start chatting.</p>
      </div>

      <form id="registerForm" class="space-y-4">
        
        <div>
          <label for="fullName" class="block text-sm font-medium text-slate-600 mb-1.5">Full Name</label>
          <div class="relative rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-regular fa-user text-slate-400"></i>
            </div>
            <input type="text" id="fullName" placeholder="Christian Imbha" required
              class="block w-full pl-11 pr-4 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
          </div>
        </div>

        
      </form>
    </div>

   
    
  </main>

 </body>
</html>
