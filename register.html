<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kadea Chat - Inscription</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<header class="flex flex-col items-center text-center">
    <img src="comment.png" alt="Chat Logo" width="48" height="48">
    <h1 class="text-2xl font-bold text-blue-600 tracking-tight">Kadea Chat</h1>
</header>
<body class="bg-[#f8fafc] flex flex-col items-center justify-center min-h-screen p-4 antialiased">

  <main class="w-full max-w-md">
    
    <div class="bg-white rounded-[2rem] border border-slate-100 p-8 shadow-sm">
      
      <div class="mb-6">
        <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Create Account</h1>
        <p class="text-sm text-slate-500 mt-1">Join the community and start chatting.</p>
      </div>

      <form id="registerForm" class="space-y-4">
        
        <div>
          <label for="fullName" class="block text-sm font-medium text-slate-600 mb-1.5">Full Name</label>
          <div class="relative rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-regular fa-user text-slate-400"></i>
            </div>
            <input type="text" id="fullName" placeholder="Christian Imbha" required
              class="block w-full pl-11 pr-4 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-slate-600 mb-1.5">Email Address</label>
          <div class="relative rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-regular fa-envelope text-slate-400"></i>
            </div>
            <input type="email" id="email" placeholder="name@example.com" required
              class="block w-full pl-11 pr-4 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-slate-600 mb-1.5">Password</label>
          <div class="relative rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-lock text-slate-400"></i>
            </div>
            <input type="password" id="password" placeholder="••••••••" required
              class="block w-full pl-11 pr-11 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <button type="button" class="text-slate-400 hover:text-slate-600 focus:outline-none btn-toggle-password" data-target="password">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
        </div>

        <div>
          <label for="confirmPassword" class=" block text-sm font-medium text-slate-600 mb-1.5">Confirm Password</label>
          <div class="relative rounded-xl">
            <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
              <i class="fa-solid fa-rotate-left text-slate-400"></i>
            </div>
            <input type="password" id="confirmPassword" placeholder="••••••••" required
              class="block w-full pl-11 pr-11 py-3 bg-[#eff4ff] border-0 rounded-xl text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all outline-none text-sm">
            <div class="absolute inset-y-0 right-0 pr-4 flex items-center">
              <button type="button" class="text-slate-400 hover:text-slate-600 focus:outline-none btn-toggle-password" data-target="confirmPassword">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="pt-2">
          <button type="submit" 
            class="w-full flex items-center justify-center gap-2 bg-[#0052cc] hover:bg-blue-700 text-white font-semibold py-3.5 px-4 rounded-xl shadow-sm transition-colors text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Create Account
            <i class="fa-solid fa-arrow-right text-xs"></i>
          </button>
        </div>

        <p class="text-[11px] text-slate-400 text-center leading-relaxed mt-4 px-2">
          By signing up, you agree to our <a href="#" class="text-blue-600 hover:underline font-medium">Terms of Service</a> and <a href="#" class="text-blue-600 hover:underline font-medium">Privacy Policy</a>.
        </p>
      </form>
    </div>

    <p class="text-sm text-slate-600 text-center mt-6">
      Already have an account? <a href="login.html" class="text-blue-600 font-semibold hover:underline">Log in</a>
    </p>
    
  </main>
    <script src="register.js"></script>
 </body>
</html>
