<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class' 
        }
    </script>
    <!-- Tu peux retirer ce script browser@4 si tu utilises déjà le cdn tailwindcss normal juste au-dessus -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script> 
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
    <script>
    // Ce code s'exécute immédiatement avant le rendu de la page
    if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
    } else {
        document.documentElement.classList.remove('dark');
    }
    </script>
</head>
<body class="flex h-screen w-full bg-[#f4f6fa] dark:bg-slate-900 overflow-hidden font-sans antialiased text-slate-800 dark:text-slate-100 transition-colors duration-300">
    
    <!-- BARRE LATÉRALE : Masquée sur mobile, visible sur tablette/PC -->
    <aside class="hidden md:flex w-16 bg-white dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800 flex-col justify-between items-center py-4 shrink-0 transition-colors duration-300">
        <div class="flex flex-col gap-6 items-center w-full">
            <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
                <i data-lucide="message-square-more" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
           </button>
             <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
                <i data-lucide="users" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
           </button>
            <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center">
                <i data-lucide="phone" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
            </button>
            <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
                <i data-lucide="folder-archive" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
            </button>
        </div>
        <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
            <i data-lucide="settings" class="w-5 h-5 md:w-6 md:h-6"></i>
            <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                Cette fonctionnalité n'est pas disponible pour l'instant
            </span>
        </button>
    </aside>

    <!-- SECTION GAUCHE : Liste des conversations -->
    <section id="col-left" class="w-full md:w-80 bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col shrink-0 h-full transition-colors duration-300">
        
        <!-- En-tête Profil-->
        <!-- Modifié pour devenir un bouton cliquable vers la page profil (à toi de vérifier si tu l'ouvres via js ou lien html) -->
        <a href="profil.html" id="my-profile-trigger" class="p-4 flex flex-col justify-between items-center border-b border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 cursor-pointer transition rounded-t-2xl">
            <div class="flex items-center gap-3 w-full">
                <div class="relative shrink-0">
                   <img id="sidebar-user-avatar" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover" alt="Mon Avatar">
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-slate-900 rounded-full"></span>
                </div>
                <div class="flex-1">
                    <h2 id="active-user-name" class="text-sm font-semibold text-slate-900 dark:text-white">Mon Profil</h2>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Statut : Actif</p>
                </div>
                <i data-lucide="external-link" class="w-4 h-4 text-slate-400 dark:text-slate-500"></i>
            </div>
        </a>
        
        <!-- Barre de recherche -->
        <div class="p-4 relative">
            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-7 top-1/2 -translate-y-1/2"></i>
            <input type="text" placeholder="Rechercher une conversation..." class="w-full bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 pl-10 pr-4 py-2 rounded-xl text-sm border-0 focus:ring-2 focus:ring-blue-500 focus:bg-white dark:focus:bg-slate-700 outline-none transition">
        </div>

        <!-- Liste des conversations -->
        <div id="rooms-list" class="flex-1 overflow-y-auto space-y-1 px-2 pb-4">
            <!-- Les conversations s'injectent ici automatiquement -->
        </div>
    </section>

    <!-- SECTION PRINCIPALE : Fenêtre de Chat -->
    <main id="col-right" class="hidden md:flex flex-1 bg-[#f4f6fa] dark:bg-slate-900 flex-col h-full transition-colors duration-300">
        
        <!-- Header du Chat -->
        <header class="h-16 bg-white dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center px-6 shrink-0 transition-colors duration-300">
            <div class="flex items-center gap-3">
                
                <!--BOUTON RETOUR : Visible uniquement sur mobile -->
                <button id="back-to-list-btn" class="md:hidden mr-2 p-1.5 text-slate-500 hover:text-slate-800 dark:hover:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition duration-200">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>

                <div class="relative shrink-0">
                    <img id="active-chat-avatar" src="https://via.placeholder.com/40" alt="Avatar Conversation" class="w-10 h-10 rounded-full object-cover">
                    <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white dark:border-slate-950 rounded-full"></span>
                </div>
                <div>
                    <h2 id="active-chat-title" class="text-sm font-semibold text-slate-900 dark:text-white">Sélectionnez une discussion</h2>
                    <p id="active-chat-status" class="text-xs text-slate-400 dark:text-slate-500">Hors ligne</p>
                </div>
            </div>
        </header>

        <!-- Conteneur des messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-4 flex flex-col">
            <div class="text-center text-slate-400 dark:text-slate-500 text-sm my-auto">
                Cliquez sur une conversation à gauche pour commencer à discuter.
            </div>
        </div>

        <!-- Formulaire d'envoi de message -->
        <form id="message-form" class="p-4 bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 flex items-center gap-3 transition-colors duration-300">
             <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
                <i data-lucide="plus" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
            </button>
             <button class="group relative p-2.5 md:p-3 text-slate-400 cursor-not-allowed rounded-xl transition flex items-center justify-center hidden sm:flex">
                <i data-lucide="smile" class="w-5 h-5 md:w-6 md:h-6"></i>
                <span class="absolute left-16 md:left-20 bg-slate-800 text-white text-[11px] font-medium px-2 py-1 rounded shadow-md opacity-0 group-hover:opacity-100 transition whitespace-nowrap pointer-events-none z-50">
                    Cette fonctionnalité n'est pas disponible pour l'instant
                </span>
            </button>
            
            <div class="flex-1 relative flex items-center">
                <input type="text" id="message-input" autocomplete="off" placeholder="Tapez votre message..." class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white text-sm pl-4 pr-12 py-3 rounded-2xl focus:outline-none focus:border-blue-500 focus:bg-white dark:focus:bg-slate-900 transition-colors">
                <button type="submit" id="send-btn" class="absolute right-2 bg-blue-600 hover:bg-blue-700 text-white p-2 rounded-xl transition shadow-sm cursor-pointer">
                    <i data-lucide="send-horizontal" class="w-4 h-4"></i>
                </button>
            </div>
        </form>
    </main>

    <script>
        lucide.createIcons();
    </script>
    
    <!-- MODAL DE CONFIRMATION PERSONNALISÉ -->
    <div id="confirm-modal" class="fixed inset-0 bg-black/50 z-[10000] hidden items-center justify-center p-4 transition-all duration-300 backdrop-blur-sm">
        <div class="bg-white dark:bg-slate-800 rounded-2xl p-6 max-w-sm w-full shadow-2xl transform scale-95 transition-all duration-300 flex flex-col items-center text-center">
            <div class="h-12 w-12 rounded-full bg-red-50 dark:bg-red-950/30 text-red-600 dark:text-red-400 flex items-center justify-center mb-4">
                <i data-lucide="alert-triangle" class="w-6 h-6"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">Confirmation</h3>
            <p class="text-sm text-slate-500 dark:text-slate-300 mb-6">Voulez-vous vraiment supprimer ce message ? Cette action est définitive.</p>
            <div class="flex gap-3 w-full">
                <button id="confirm-cancel-btn" class="flex-1 px-4 py-2.5 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 text-slate-800 dark:text-slate-200 text-sm font-semibold rounded-xl transition cursor-pointer">
                    Annuler
                </button>
                <button id="confirm-ok-btn" class="flex-1 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl transition cursor-pointer">
                    Supprimer
                </button>
            </div>
        </div>
    </div>
    
    <section id="profile-view" class="hidden flex-1 bg-[#f4f6fa] dark:bg-slate-900 flex-col h-full overflow-y-auto"></section>
    
    <!-- CONTENEUR POUR LES TOASTS -->
    <div id="toast-container" class="fixed bottom-5 right-5 z-[9999] flex flex-col gap-2 pointer-events-none"></div>
    <script src="chat.js"></script>
     
</body>
</html>
