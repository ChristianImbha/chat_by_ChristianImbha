<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Masquer la scrollbar pour une interface plus propre style WhatsApp Web */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-gray-200 h-screen w-screen flex items-center justify-center font-sans antialiased">
    <aside class="w-20 bg-white border-r border-slate-200 flex flex-col justify-between items-center py-6 flex-shrink-0">
        <div class="flex flex-col items-center gap-8 w-full">
            <span class="text-blue-700 font-bold text-xl tracking-tight">forum</span>
            <nav class="flex flex-col gap-6 w-full items-center">
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="message-square" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="phone" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </button>
                <button class="p-3 text-slate-400 hover:text-slate-600 rounded-xl transition">
                    <i data-lucide="calendar" class="w-6 h-6"></i>
                </button>
            </nav>
        </div>

        <div class="flex flex-col items-center gap-6 w-full">
            <div class="relative w-full flex justify-center">
                <div class="absolute left-0 top-0 bottom-0 w-1 bg-blue-600 rounded-r"></div>
                <button class="p-3 text-blue-600 rounded-xl">
                    <i data-lucide="settings" class="w-6 h-6"></i>
                </button>
            </div>
            <button class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 transition shadow-sm">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </button>
        </div>
    </aside>
    
        <main class="hidden md:flex flex-1 flex-col h-full bg-gray-50" id="chat-panel">
            <div class="flex items-center justify-between bg-gray-100 p-3 border-b border-gray-200 shadow-sm">
                <div class="flex items-center space-x-3">
                    <img id="active-chat-avatar" src="https://via.placeholder.com/40" class="w-10 h-10 rounded-full object-cover" alt="Salon Avatar">
                    <div>
                        <h2 id="active-chat-title" class="font-semibold text-gray-800 text-sm">Sélectionnez une discussion</h2>
                        <p id="active-chat-status" class="text-xs text-gray-400">Cliquez sur un salon pour commencer à échanger</p>
                    </div>
                </div>
            </div>

            <div id="messages-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-[url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')] bg-repeat no-scrollbar">
                
                <div class="flex items-end space-x-2 max-w-[75%]">
                    <div class="bg-white text-gray-800 text-sm rounded-lg p-2.5 shadow-sm rounded-bl-none">
                        <p class="font-bold text-xs text-indigo-600 mb-0.5">Formateur Kadea</p>
                        <p>Bienvenue sur le prototype de messagerie ! Sélectionnez un groupe pour voir les messages de l'API.</p>
                        <span class="block text-right text-[10px] text-gray-400 mt-1">11:00</span>
                    </div>
                </div>

                <div class="flex items-end space-x-2 max-w-[75%] ml-auto justify-end">
                    <div class="bg-green-100 text-gray-800 text-sm rounded-lg p-2.5 shadow-sm rounded-br-none">
                        <p>Super, l'interface Tailwind fonctionne parfaitement !</p>
                        <span class="block text-right text-[10px] text-gray-400 mt-1">11:02</span>
                    </div>
                </div>

            </div>

            <div class="p-3 bg-gray-100 border-t border-gray-200">
                <form id="message-form" class="flex items-center space-x-3">
                    <input type="text" 
                           id="message-input" 
                           placeholder="Tapez un message" 
                           autocomplete="off"
                           class="flex-1 bg-white border border-gray-300 rounded-lg px-4 py-2 text-sm text-gray-700 placeholder-gray-400 outline-none focus:border-blue-500">
                    
                    <button type="submit" 
                            id="send-btn" 
                            class="bg-blue-600 hover:bg-blue-700 text-white rounded-full p-2.5 transition-colors focus:outline-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 transform rotate-90" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </button>
                </form>
            </div>
        </main>

    </div>    

    <script src="chat.js"></script>
</body>
</html>
