<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Masquer la scrollbar pour une interface plus propre style WhatsApp Web */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="bg-white w-full h-full md:max-w-7xl md:h-[95vh] shadow-2xl rounded-none md:rounded-lg flex overflow-hidden">
        
        <aside class="w-full md:w-1/3 border-r border-gray-300 flex flex-col h-full bg-white" id="sidebar-panel">
            
            <div class="flex items-center justify-between bg-gray-100 p-3 border-b border-gray-200">
                <div class="flex items-center space-x-3 cursor-pointer">
                    <img id="user-avatar" 
                         src="https://via.placeholder.com/40" 
                         alt="Photo de profil" 
                         class="w-10 h-10 rounded-full object-cover border border-gray-300">
                    
                    <div class="flex flex-col">
                        <span id="user-name" class="font-semibold text-gray-800 text-sm">Chargement...</span>
                        <span class="text-xs text-green-600 font-medium">En ligne</span>
                    </div>
                </div>

                <div class="flex items-center space-x-3 text-gray-600">
                    <button class="hover:text-gray-900 focus:outline-none" title="Nouvelle discussion">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                        </svg>
                    </button>
                    <button id="logout-btn" class="hover:text-red-600 focus:outline-none" title="Se déconnecter">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </button>
                </div>
            </div>

           
        </aside>
</body>
</html>
