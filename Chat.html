<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadea Chat - Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Masquer la scrollbar pour une interface plus propre style WhatsApp Web */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="bg-white w-full h-full md:max-w-7xl md:h-[95vh] shadow-2xl rounded-none md:rounded-lg flex overflow-hidden">
        
        <aside class="w-full md:w-1/3 border-r border-gray-300 flex flex-col h-full bg-white" id="sidebar-panel">
            
            <div class="flex items-center justify-between bg-gray-100 p-3 border-b border-gray-200">
                <div class="flex items-center space-x-3 cursor-pointer">
                    <img id="user-avatar" 
                         src="https://via.placeholder.com/40" 
                         alt="Photo de profil" 
                         class="w-10 h-10 rounded-full object-cover border border-gray-300">
                    
                    <div class="flex flex-col">
                        <span id="user-name" class="font-semibold text-gray-800 text-sm">Chargement...</span>
                        <span class="text-xs text-green-600 font-medium">En ligne</span>
                    </div>
                </div>

               
            </div>

           
        </aside>
</body>
</html>
